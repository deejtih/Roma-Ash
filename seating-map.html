<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seating Map · Roma &amp; Ashith</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --ink:#1e1a17; --ink-mid:#4a3f38; --ink-soft:#7a6b62; --ink-faint:#a89890;
    --parchment:#f7f3ee; --paper:#fdfbf8;
    --gold:#b8975a; --gold-pale:#e0cc9e;
    --rule:#ddd5cc; --hover-bg:#f0e6d8; --active-bg:#e8d5bc;
  }
  body { font-family:'Tenor Sans',sans-serif; background:var(--parchment); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:3rem 1.5rem 5rem; color:var(--ink); position:relative; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(184,151,90,.05) 39px,rgba(184,151,90,.05) 40px); pointer-events:none; z-index:0; }
  .corner { position:fixed; width:56px; height:56px; pointer-events:none; z-index:0; }
  .corner-tl { top:1.5rem; left:1.5rem; border-top:1px solid var(--gold-pale); border-left:1px solid var(--gold-pale); }
  .corner-tr { top:1.5rem; right:1.5rem; border-top:1px solid var(--gold-pale); border-right:1px solid var(--gold-pale); }
  .corner-bl { bottom:1.5rem; left:1.5rem; border-bottom:1px solid var(--gold-pale); border-left:1px solid var(--gold-pale); }
  .corner-br { bottom:1.5rem; right:1.5rem; border-bottom:1px solid var(--gold-pale); border-right:1px solid var(--gold-pale); }
  #loading-msg { font-size:.68rem; letter-spacing:.24em; text-transform:uppercase; color:var(--ink-faint); position:relative; z-index:1; animation:pulse 1.8s ease-in-out infinite; margin-top:6rem; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  #app { display:none; width:100%; flex-direction:column; align-items:center; position:relative; z-index:1; animation:rise .7s cubic-bezier(.22,.68,0,1.2) both; }
  @keyframes rise { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
  .nav-back { align-self:flex-start; font-size:.65rem; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-mid); text-decoration:none; border-bottom:1px solid var(--rule); padding-bottom:.2rem; margin-bottom:2.5rem; transition:color .2s,border-color .2s; }
  .nav-back:hover { color:var(--gold); border-color:var(--gold-pale); }
  .header { text-align:center; margin-bottom:2rem; }
  .pre-title { font-size:.65rem; letter-spacing:.32em; text-transform:uppercase; color:var(--gold); margin-bottom:.8rem; display:block; }
  h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(2.8rem,8vw,4.2rem); font-weight:300; font-style:italic; color:var(--ink); line-height:.92; margin-bottom:.7rem; }
  .subtitle { font-size:.65rem; letter-spacing:.26em; text-transform:uppercase; color:var(--ink-soft); }
  .ornament { display:flex; align-items:center; gap:.8rem; margin:0 auto 2.5rem; max-width:240px; width:100%; }
  .ornament-line { flex:1; height:1px; background:linear-gradient(to right,transparent,var(--gold-pale),transparent); }
  .ornament-gem { color:var(--gold); font-size:9px; }

  /* Side-by-side layout */
  .layout { display:flex; flex-direction:row; gap:2rem; align-items:flex-start; width:100%; max-width:1300px; }

  /* Map */
  .map-wrap { flex:1 1 auto; min-width:0; background:var(--paper); border:1px solid var(--rule); border-radius:2px; padding:1.5rem; box-shadow:0 2px 4px rgba(30,26,23,.04),0 12px 48px rgba(30,26,23,.08),inset 0 1px 0 rgba(255,255,255,.9); position:relative; overflow:auto; }
  .map-wrap::before { content:''; position:absolute; top:10px; left:10px; width:14px; height:14px; border-top:1px solid var(--gold-pale); border-left:1px solid var(--gold-pale); }
  .map-wrap::after  { content:''; position:absolute; bottom:10px; right:10px; width:14px; height:14px; border-bottom:1px solid var(--gold-pale); border-right:1px solid var(--gold-pale); }
  #map { display:block; max-width:100%; height:auto; }

  /* Tables */
  .tbl { cursor:pointer; }
  .tbl circle.bg { fill:var(--paper); stroke:#a89880; stroke-width:1.8; transition:fill .18s,stroke .2s,stroke-width .18s; filter:drop-shadow(0 1px 4px rgba(30,26,23,.11)); }
  .tbl text.num { font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:400; font-style:italic; fill:#2a2218; text-anchor:middle; dominant-baseline:central; pointer-events:none; transition:fill .18s; user-select:none; }
  .tbl text.sub { font-family:'Tenor Sans',sans-serif; font-size:7px; letter-spacing:.1em; text-transform:uppercase; fill:var(--gold); text-anchor:middle; pointer-events:none; user-select:none; }
  .tbl:hover circle.bg { fill:var(--hover-bg); stroke:var(--gold); stroke-width:2.2; }
  .tbl:hover text.num  { fill:#8b6f3a; }
  .tbl.active circle.bg { fill:var(--active-bg); stroke:var(--gold); stroke-width:2.8; filter:drop-shadow(0 2px 8px rgba(184,151,90,.4)); }
  .tbl.active text.num  { fill:#5c3d10; }
  .tbl.sweetheart circle.bg { fill:#fdf0e0; stroke:var(--gold); stroke-width:2; }
  .tbl.sweetheart text.num  { fill:#8b6f3a; }
  .tbl.sweetheart.active circle.bg, .tbl.sweetheart:hover circle.bg { fill:var(--active-bg); stroke-width:2.8; }

  /* Room labels */
  .rlbl    { font-family:'Tenor Sans',sans-serif; font-size:10px; letter-spacing:.13em; text-transform:uppercase; fill:#6b5d54; text-anchor:middle; dominant-baseline:central; pointer-events:none; user-select:none; }
  .rlbl-lg { font-family:'Cormorant Garamond',serif; font-size:17px; font-style:italic; fill:#6b5d54; text-anchor:middle; dominant-baseline:central; pointer-events:none; user-select:none; }
  .rlbl-sm { font-family:'Tenor Sans',sans-serif; font-size:8.5px; letter-spacing:.11em; text-transform:uppercase; fill:#8a7a72; text-anchor:middle; dominant-baseline:central; pointer-events:none; user-select:none; }

  /* Sticky panel */
  .panel { flex:0 0 300px; width:300px; position:sticky; top:2rem; align-self:flex-start; }
  .panel-placeholder { border:1px dashed var(--rule); border-radius:2px; padding:2.5rem 1.75rem; text-align:center; }
  .panel-placeholder p { font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--ink-faint); font-size:1.05rem; line-height:1.8; }
  .panel-card { background:var(--paper); border:1px solid var(--rule); border-radius:2px; padding:2rem 1.75rem; display:none; animation:rise .3s ease both; position:relative; box-shadow:0 4px 28px rgba(30,26,23,.08); }
  .panel-card::before { content:''; position:absolute; top:10px; left:10px; width:10px; height:10px; border-top:1px solid var(--gold-pale); border-left:1px solid var(--gold-pale); }
  .panel-card::after  { content:''; position:absolute; bottom:10px; right:10px; width:10px; height:10px; border-bottom:1px solid var(--gold-pale); border-right:1px solid var(--gold-pale); }
  .pc-num  { font-family:'Cormorant Garamond',serif; font-size:4.5rem; font-weight:300; color:var(--gold); line-height:1; margin-bottom:.05rem; }
  .pc-lbl  { font-size:.64rem; letter-spacing:.28em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:1.4rem; }
  .pc-sep  { height:1px; background:linear-gradient(to right,transparent,var(--rule),transparent); margin-bottom:1.2rem; }
  .pc-guests-lbl { font-size:.62rem; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:.65rem; }
  .pc-guest { font-family:'Cormorant Garamond',serif; font-size:1.05rem; color:var(--ink-mid); line-height:1.9; }
  .pc-count { font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); margin-top:.9rem; padding-top:.9rem; border-top:1px solid var(--rule); }

  @media (max-width:900px) { .layout { flex-direction:column; } .panel { flex:none; width:100%; position:static; } }
</style>
</head>
<body>
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div><div class="corner corner-br"></div>
  <p id="loading-msg">Loading guest list…</p>
  <div id="app">
    <a href="index.html" class="nav-back">← Back to find my seat</a>
    <div class="header">
      <span class="pre-title">Reception layout</span>
      <h1>Seating Map</h1>
      <p class="subtitle">Roma &amp; Ashith &middot; April 25, 2026</p>
    </div>
    <div class="ornament">
      <div class="ornament-line"></div><span class="ornament-gem">✦</span><div class="ornament-line"></div>
    </div>
    <div class="layout">
      <div class="map-wrap">
        <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="panel">
        <div class="panel-placeholder" id="panel-empty"><p>Tap any table to see who's seated there</p></div>
        <div class="panel-card" id="panel-card">
          <div class="pc-num" id="pc-num"></div>
          <div class="pc-lbl" id="pc-lbl">Table</div>
          <div class="pc-sep"></div>
          <div class="pc-guests-lbl">Guests</div>
          <div id="pc-guests"></div>
          <div class="pc-count" id="pc-count"></div>
        </div>
      </div>
    </div>
  </div>

<script>
let guests = [], tableMap = {};

async function loadGuests() {
  try {
    const res = await fetch('guests.xlsx?v=' + Date.now());
    if (!res.ok) throw new Error();
    const buf = await res.arrayBuffer();
    const wb  = XLSX.read(buf, { type:'array' });
    const ws  = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
    guests = rows.map(r => ({
      name:  String(r['Full Name']    || '').trim(),
      table: String(r['Table Number'] || '').trim(),
    })).filter(g => g.name && g.table);
    tableMap = {};
    guests.forEach(g => {
      if (!tableMap[g.table]) tableMap[g.table] = [];
      tableMap[g.table].push(g.name);
    });
    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    buildMap();
  } catch(e) {
    document.getElementById('loading-msg').textContent = 'Guest list could not be loaded.';
  }
}
loadGuests();

const NS = 'http://www.w3.org/2000/svg';
function mk(tag, a={}) { const e=document.createElementNS(NS,tag); Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v)); return e; }
function add(p,...kids) { kids.forEach(k=>p.appendChild(k)); return p; }
function rct(x,y,w,h,a={}) { return mk('rect',{x,y,width:w,height:h,...a}); }
function lin(x1,y1,x2,y2,a={}) { return mk('line',{x1,y1,x2,y2,...a}); }
function lbl(x,y,s,c) { const t=mk('text',{x,y,class:c}); t.textContent=s; return t; }

// ─────────────────────────────────────────────────────────────────────────────
// LAYOUT ANALYSIS (from comparing both images carefully):
//
// The floor plan is a wide room. Key insight:
//   • Tables 17 and 13 are NOT above the dance floor —
//     they sit in ROW 1 at the SAME height as 7 and 19 (and 3/9/22/18).
//   • The dance floor is a large square that sits BELOW row 1,
//     occupying the LEFT side of the room (rows 2–5 vertically).
//   • The table grid is to the RIGHT of the dance floor for rows 2–5,
//     and spans the full width for row 1 (top) and rows 6–7 (bottom).
//
// EXACT LAYOUT (rows top→bottom, cols left→right):
//
//  Row 1  (y=R1): 17 · 13 · [gap=dance floor top] · 7 · 19
//                  ↑ left side                        ↑ right side
//
//  Rows 2–5: Dance floor occupies left cols; table grid fills right side
//    Row 2  (y=R2):  [dance floor] · 3  ·  9  · 22 · 18
//    Row 3  (y=R3):  [dance floor] · 5  · 15  · 12 · 24
//    Row 4  (y=R4):  [dance floor] · 1♥ · 11  ·  4 · 23
//    Row 5  (y=R5):  [dance floor] · 6  · 21  · 20 · 16
//
//  Row 6  (y=R6): 25 · [gap] · 2  ·  8  · 10 · 27
//                  ↑ left of dance floor col
//
//  Row 7  (y=R7): 28 · 14 · [gap] · (nothing — bottom cluster)
//
// The dashed vertical line sits between col B and col C (between 3/5/1♥/6/2 and 9/15/11/21/8 roughly).
//
// COLUMN X POSITIONS:
//   Col 0 (17,13,25,28): x=C0  — left side, beside/below dance floor
//   Col 0b (14):         x=C0b — slightly right of 28
//   Col A (3,5,1♥,6,2):  x=CA  — right edge of dance floor
//   Col B (9,15,11,21,8): x=CB
//   Col C (22,12,4,20,10):x=CC
//   Col D (18,24,23,16,27):x=CD
//   7 and 19 in top row align with cols B/C or C/D
//
// VERIFIED from image 1 screenshot:
//   17(col≈1), 13(col≈2), 7(col≈4), 19(col≈5)  — top row, 4 tables
//   3(col≈3),  9(col≈4), 22(col≈5), 18(col≈6)  — row 2
//   5,         15,        12,         24          — row 3
//   1♥,        11,         4,         23          — row 4
//   25, 6,     21,        20,         16          — row 5 (25 is LEFT, then 6 continues)
//   28, 14, 2,  8,        10,         27          — bottom rows
//
// ─────────────────────────────────────────────────────────────────────────────

// ViewBox: wide room
// R=26 table radius, S=84 spacing
const VW=920, VH=760, R=26, S=84;

// Key x positions
const C17=200, C13=284;                    // left-side top tables
const CA=368, CB=452, CC=536, CD=620;      // 4 main right-side columns
const C7=536,  C19=620;                    // top row right tables (align with CC/CD)

// Key y positions
const R1=96;                               // top row
const R2=180, R3=264, R4=348, R5=432;     // rows beside dance floor
const R6=516, R7=600;                      // bottom rows

// Dance floor: left wall x=16, top y just below top strip
// DF spans from x=16 to just left of CA, y from below bars to above row 6
const DF_X=16, DF_Y=136, DF_W=316, DF_H=340;

function buildMap() {
  const svg = document.getElementById('map');
  svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
  svg.setAttribute('width', VW);
  svg.setAttribute('height', VH);

  // Room wall
  add(svg, rct(16,16,VW-32,VH-32,{fill:'none',stroke:'#bfb5aa','stroke-width':'1.5',rx:'3'}));

  // DJ Table — top-left corner
  add(svg,
    rct(16,16,60,54,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1'}),
    lbl(46,43,'DJ TABLE','rlbl-sm')
  );

  // Bar LEFT — top, left of centre
  add(svg,
    rct(308,16,140,54,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'2'}),
    lbl(378,43,'BAR','rlbl')
  );

  // Bar RIGHT — top, right side
  add(svg,
    rct(634,16,150,54,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'2'}),
    lbl(709,43,'BAR','rlbl')
  );

  // Dance floor
  add(svg,
    rct(DF_X, DF_Y, DF_W, DF_H, {fill:'#ede5d8',stroke:'#c8b99a','stroke-width':'1.2',rx:'2'}),
    lbl(DF_X+DF_W/2, DF_Y+DF_H/2-12, 'Dance Floor', 'rlbl-lg'),
    lbl(DF_X+DF_W/2, DF_Y+DF_H/2+12, "21' × 21'", 'rlbl-sm')
  );

  // Backdrop + arch — left wall, beside dance floor
  add(svg,
    rct(16, DF_Y+DF_H+10, 14, 90, {fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1'}),
    lbl(23, DF_Y+DF_H+55, 'BKDROP', 'rlbl-sm'),
    lbl(23, DF_Y+DF_H+68, '+ARCH',  'rlbl-sm')
  );

  // Gift table
  add(svg,
    rct(16, DF_Y+DF_H+114, 110, 26, {fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'1'}),
    lbl(71, DF_Y+DF_H+127, 'GIFT TABLE', 'rlbl-sm')
  );

  // Photo bal & stairs — bottom-left
  add(svg,
    rct(16, DF_Y+DF_H+150, 150, 180, {fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'2'}),
    lbl(91, DF_Y+DF_H+235, 'PHOTO BAL', 'rlbl'),
    lbl(91, DF_Y+DF_H+250, '& STAIRS',  'rlbl')
  );

  // Bridal entrance
  add(svg,
    rct(182, VH-46, 162, 26, {fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'1'}),
    lbl(263, VH-33, 'BRIDAL ENTRANCE', 'rlbl-sm')
  );

  // Guest entrance
  add(svg,
    rct(370, VH-46, 162, 26, {fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'1'}),
    lbl(451, VH-33, 'GUEST ENTRANCE', 'rlbl-sm')
  );

  // QR / welcome sign
  add(svg,
    rct(656, VH-46, 120, 26, {fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'1'}),
    lbl(716, VH-33, 'QR / SIGN', 'rlbl-sm')
  );

  // Photo booth — right wall
  add(svg,
    rct(VW-48, R5+40, 32, 130, {fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'2'}),
    lbl(VW-32, R5+105, 'PHOTO', 'rlbl-sm'),
    lbl(VW-32, R5+118, 'BOOTH', 'rlbl-sm')
  );

  // Dashed vertical divider (between left and right sections)
  add(svg,
    lin(410, 70, 410, VH-50, {stroke:'#ccc3ba','stroke-width':'1','stroke-dasharray':'6,5'})
  );

  // ── TABLES ──────────────────────────────────────────────────────────────
  //
  // Reading from the floor plan image precisely:
  //
  // ROW 1 (top, y=R1=96):
  //   17 at x=200  13 at x=284  |  7 at x=536  19 at x=620
  //
  // ROWS 2–5 (right side only, dance floor fills left):
  //   Col A x=368:  3, 5, 1♥, 6
  //   Col B x=452:  9, 15, 11, 21
  //   Col C x=536:  22, 12, 4, 20
  //   Col D x=620:  18, 24, 23, 16
  //
  // ROW 6 (y=R6=516) — full width:
  //   25 at x=200  |  2 at x=368  8 at x=452  10 at x=536  27 at x=620
  //
  // ROW 7 (y=R7=600) — bottom cluster:
  //   28 at x=116  14 at x=200  |  (nothing on right side)
  //
  // Note: table 2 is in col A row 6 (matching image1 screenshot showing 2 bottom-left of right grid)
  // ─────────────────────────────────────────────────────────────────────────

  const tables = [
    // Row 1
    { n:17, x:C17, y:R1 },
    { n:13, x:C13, y:R1 },
    { n:7,  x:C7,  y:R1 },
    { n:19, x:C19, y:R1 },

    // Col A rows 2–5
    { n:3,  x:CA, y:R2 },
    { n:5,  x:CA, y:R3 },
    { n:1,  x:CA, y:R4, sweetheart:true },
    { n:6,  x:CA, y:R5 },

    // Col B rows 2–5
    { n:9,  x:CB, y:R2 },
    { n:15, x:CB, y:R3 },
    { n:11, x:CB, y:R4 },
    { n:21, x:CB, y:R5 },

    // Col C rows 2–5
    { n:22, x:CC, y:R2 },
    { n:12, x:CC, y:R3 },
    { n:4,  x:CC, y:R4 },
    { n:20, x:CC, y:R5 },

    // Col D rows 2–5
    { n:18, x:CD, y:R2 },
    { n:24, x:CD, y:R3 },
    { n:23, x:CD, y:R4 },
    { n:16, x:CD, y:R5 },

    // Row 6 — full width
    { n:25, x:C17, y:R6 },
    { n:2,  x:CA,  y:R6 },
    { n:8,  x:CB,  y:R6 },
    { n:10, x:CC,  y:R6 },
    { n:27, x:CD,  y:R6 },

    // Row 7 — bottom-left cluster
    { n:28, x:116, y:R7 },
    { n:14, x:C17, y:R7 },
  ];

  tables.forEach(t => drawTable(svg, t.n, t.x, t.y, !!t.sweetheart));
}

function drawTable(svg, num, x, y, isSweetheart) {
  const g = mk('g', { class:'tbl'+(isSweetheart?' sweetheart':''), 'data-table':num });
  add(g, mk('circle',{class:'bg',cx:x,cy:y,r:R}));
  if (isSweetheart) {
    const n=mk('text',{class:'num',x,y:y-8}); n.textContent=num; add(g,n);
    const s=mk('text',{class:'sub',x,y:y+10}); s.textContent='♥ sweetheart'; add(g,s);
  } else {
    const n=mk('text',{class:'num',x,y}); n.textContent=num; add(g,n);
  }
  add(svg,g);
  g.addEventListener('click',()=>selectTable(num,g,isSweetheart));
}

let activeEl=null;
function selectTable(num,el,isSweetheart){
  if(activeEl===el){
    el.classList.remove('active'); activeEl=null;
    document.getElementById('panel-empty').style.display='block';
    document.getElementById('panel-card').style.display='none';
    return;
  }
  if(activeEl) activeEl.classList.remove('active');
  el.classList.add('active'); activeEl=el;
  const names=tableMap[String(num)]||[];
  document.getElementById('panel-empty').style.display='none';
  const card=document.getElementById('panel-card');
  card.style.animation='none'; card.offsetHeight; card.style.animation='';
  card.style.display='block';
  document.getElementById('pc-num').textContent=num;
  document.getElementById('pc-lbl').textContent=isSweetheart?'Sweetheart Table':'Table';
  document.getElementById('pc-guests').innerHTML=names.length
    ?names.map(n=>`<div class="pc-guest">${n}</div>`).join('')
    :`<div class="pc-guest" style="color:var(--ink-faint);font-style:italic">No guests assigned</div>`;
  document.getElementById('pc-count').textContent=names.length
    ?names.length+(names.length===1?' guest':' guests'):'';
}
</script>
</body>
</html>
