<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seating Map · Roma &amp; Ashith</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  :root {
    --ink:#1e1a17; --ink-mid:#4a3f38; --ink-soft:#7a6b62; --ink-faint:#a89890;
    --parchment:#f7f3ee; --paper:#fdfbf8;
    --gold:#b8975a; --gold-pale:#e0cc9e;
    --rule:#ddd5cc; --hover-bg:#f0e6d8; --active-bg:#e8d5bc;
  }

  body {
    font-family:'Tenor Sans',sans-serif;
    background:var(--parchment);
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:3rem 1.5rem 5rem;
    color:var(--ink); position:relative; overflow-x:hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(184,151,90,.05) 39px,rgba(184,151,90,.05) 40px);
    pointer-events:none; z-index:0;
  }

  .corner { position:fixed; width:56px; height:56px; pointer-events:none; z-index:0; }
  .corner-tl { top:1.5rem; left:1.5rem; border-top:1px solid var(--gold-pale); border-left:1px solid var(--gold-pale); }
  .corner-tr { top:1.5rem; right:1.5rem; border-top:1px solid var(--gold-pale); border-right:1px solid var(--gold-pale); }
  .corner-bl { bottom:1.5rem; left:1.5rem; border-bottom:1px solid var(--gold-pale); border-left:1px solid var(--gold-pale); }
  .corner-br { bottom:1.5rem; right:1.5rem; border-bottom:1px solid var(--gold-pale); border-right:1px solid var(--gold-pale); }

  #loading-msg {
    font-size:.68rem; letter-spacing:.24em; text-transform:uppercase;
    color:var(--ink-faint); position:relative; z-index:1;
    animation:pulse 1.8s ease-in-out infinite; margin-top:6rem;
  }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  #app {
    display:none; width:100%; flex-direction:column; align-items:center;
    position:relative; z-index:1;
    animation:rise .7s cubic-bezier(.22,.68,0,1.2) both;
  }
  @keyframes rise { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

  .nav-back {
    align-self:flex-start; font-size:.65rem; letter-spacing:.2em; text-transform:uppercase;
    color:var(--ink-mid); text-decoration:none; border-bottom:1px solid var(--rule);
    padding-bottom:.2rem; margin-bottom:2.5rem; transition:color .2s,border-color .2s;
  }
  .nav-back:hover { color:var(--gold); border-color:var(--gold-pale); }

  .header { text-align:center; margin-bottom:2rem; }
  .pre-title { font-size:.65rem; letter-spacing:.32em; text-transform:uppercase; color:var(--gold); margin-bottom:.8rem; display:block; }
  h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(2.8rem,8vw,4.2rem); font-weight:300; font-style:italic; color:var(--ink); line-height:.92; margin-bottom:.7rem; }
  .subtitle { font-size:.65rem; letter-spacing:.26em; text-transform:uppercase; color:var(--ink-soft); }

  .ornament { display:flex; align-items:center; gap:.8rem; margin:0 auto 2.5rem; max-width:240px; width:100%; }
  .ornament-line { flex:1; height:1px; background:linear-gradient(to right,transparent,var(--gold-pale),transparent); }
  .ornament-gem { color:var(--gold); font-size:9px; }

  /* ── Main layout: map left, panel right ── */
  .layout {
    display:flex;
    flex-direction:row;
    gap:2rem;
    align-items:flex-start;
    width:100%;
    max-width:1280px;
  }

  /* ── Map card ── */
  .map-wrap {
    flex:1 1 auto;
    min-width:0;
    background:var(--paper);
    border:1px solid var(--rule);
    border-radius:2px;
    padding:1.5rem;
    box-shadow:0 2px 4px rgba(30,26,23,.04),0 12px 48px rgba(30,26,23,.08),inset 0 1px 0 rgba(255,255,255,.9);
    position:relative;
    overflow:auto;
  }
  .map-wrap::before { content:''; position:absolute; top:10px; left:10px; width:14px; height:14px; border-top:1px solid var(--gold-pale); border-left:1px solid var(--gold-pale); }
  .map-wrap::after  { content:''; position:absolute; bottom:10px; right:10px; width:14px; height:14px; border-bottom:1px solid var(--gold-pale); border-right:1px solid var(--gold-pale); }

  #map { display:block; max-width:100%; height:auto; }

  /* ── SVG: tables ── */
  .tbl { cursor:pointer; }
  .tbl circle.bg {
    fill:var(--paper); stroke:#a89880; stroke-width:1.8;
    transition:fill .18s,stroke .2s,stroke-width .18s;
    filter:drop-shadow(0 1px 4px rgba(30,26,23,.11));
  }
  .tbl text.num {
    font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:400; font-style:italic;
    fill:#2a2218; text-anchor:middle; dominant-baseline:central;
    pointer-events:none; transition:fill .18s; user-select:none;
  }
  .tbl text.sub {
    font-family:'Tenor Sans',sans-serif; font-size:7px; letter-spacing:.1em; text-transform:uppercase;
    fill:var(--gold); text-anchor:middle; pointer-events:none; user-select:none;
  }
  .tbl:hover circle.bg { fill:var(--hover-bg); stroke:var(--gold); stroke-width:2.2; }
  .tbl:hover text.num  { fill:#8b6f3a; }
  .tbl.active circle.bg { fill:var(--active-bg); stroke:var(--gold); stroke-width:2.8; filter:drop-shadow(0 2px 8px rgba(184,151,90,.4)); }
  .tbl.active text.num  { fill:#5c3d10; }
  .tbl.sweetheart circle.bg { fill:#fdf0e0; stroke:var(--gold); stroke-width:2; }
  .tbl.sweetheart text.num  { fill:#8b6f3a; }
  .tbl.sweetheart.active circle.bg, .tbl.sweetheart:hover circle.bg { fill:var(--active-bg); stroke-width:2.8; }

  /* SVG room labels */
  .rlbl    { font-family:'Tenor Sans',sans-serif; font-size:10px; letter-spacing:.13em; text-transform:uppercase; fill:#6b5d54; text-anchor:middle; dominant-baseline:central; pointer-events:none; user-select:none; }
  .rlbl-lg { font-family:'Cormorant Garamond',serif; font-size:18px; font-style:italic; fill:#6b5d54; text-anchor:middle; dominant-baseline:central; pointer-events:none; user-select:none; }
  .rlbl-sm { font-family:'Tenor Sans',sans-serif; font-size:9px; letter-spacing:.11em; text-transform:uppercase; fill:#8a7a72; text-anchor:middle; dominant-baseline:central; pointer-events:none; user-select:none; }

  /* ── Sticky side panel ── */
  .panel {
    flex:0 0 300px;
    width:300px;
    position:sticky;
    top:2rem;
    align-self:flex-start;
  }

  .panel-placeholder {
    border:1px dashed var(--rule); border-radius:2px;
    padding:2.5rem 1.75rem; text-align:center;
  }
  .panel-placeholder p {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    color:var(--ink-faint); font-size:1.05rem; line-height:1.8;
  }

  .panel-card {
    background:var(--paper); border:1px solid var(--rule); border-radius:2px;
    padding:2rem 1.75rem; display:none;
    animation:rise .3s ease both; position:relative;
    box-shadow:0 4px 28px rgba(30,26,23,.08);
  }
  .panel-card::before { content:''; position:absolute; top:10px; left:10px; width:10px; height:10px; border-top:1px solid var(--gold-pale); border-left:1px solid var(--gold-pale); }
  .panel-card::after  { content:''; position:absolute; bottom:10px; right:10px; width:10px; height:10px; border-bottom:1px solid var(--gold-pale); border-right:1px solid var(--gold-pale); }

  .pc-num  { font-family:'Cormorant Garamond',serif; font-size:4.5rem; font-weight:300; color:var(--gold); line-height:1; margin-bottom:.05rem; }
  .pc-lbl  { font-size:.64rem; letter-spacing:.28em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:1.4rem; }
  .pc-sep  { height:1px; background:linear-gradient(to right,transparent,var(--rule),transparent); margin-bottom:1.2rem; }
  .pc-guests-lbl { font-size:.62rem; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:.65rem; }
  .pc-guest { font-family:'Cormorant Garamond',serif; font-size:1.05rem; color:var(--ink-mid); line-height:1.9; }
  .pc-count { font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); margin-top:.9rem; padding-top:.9rem; border-top:1px solid var(--rule); }

  /* ── Responsive: stack on small screens ── */
  @media (max-width:860px) {
    .layout { flex-direction:column; }
    .panel  { flex:none; width:100%; position:static; }
  }
</style>
</head>
<body>
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div><div class="corner corner-br"></div>

  <p id="loading-msg">Loading guest list…</p>

  <div id="app">
    <a href="index.html" class="nav-back">← Back to find my seat</a>

    <div class="header">
      <span class="pre-title">Reception layout</span>
      <h1>Seating Map</h1>
      <p class="subtitle">Roma &amp; Ashith &middot; April 25, 2026</p>
    </div>
    <div class="ornament">
      <div class="ornament-line"></div><span class="ornament-gem">✦</span><div class="ornament-line"></div>
    </div>

    <div class="layout">

      <!-- Map -->
      <div class="map-wrap">
        <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>

      <!-- Sticky panel -->
      <div class="panel">
        <div class="panel-placeholder" id="panel-empty">
          <p>Tap any table to see who's seated there</p>
        </div>
        <div class="panel-card" id="panel-card">
          <div class="pc-num"  id="pc-num"></div>
          <div class="pc-lbl"  id="pc-lbl">Table</div>
          <div class="pc-sep"></div>
          <div class="pc-guests-lbl">Guests</div>
          <div id="pc-guests"></div>
          <div class="pc-count" id="pc-count"></div>
        </div>
      </div>

    </div>
  </div>

<script>
let guests = [], tableMap = {};

async function loadGuests() {
  try {
    const res = await fetch('guests.xlsx?v=' + Date.now());
    if (!res.ok) throw new Error();
    const buf = await res.arrayBuffer();
    const wb  = XLSX.read(buf, { type:'array' });
    const ws  = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
    guests = rows.map(r => ({
      name:  String(r['Full Name']    || '').trim(),
      table: String(r['Table Number'] || '').trim(),
    })).filter(g => g.name && g.table);
    tableMap = {};
    guests.forEach(g => {
      if (!tableMap[g.table]) tableMap[g.table] = [];
      tableMap[g.table].push(g.name);
    });
    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    buildMap();
  } catch(e) {
    document.getElementById('loading-msg').textContent = 'Guest list could not be loaded.';
  }
}
loadGuests();

// ── SVG helpers ───────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function mk(tag, attrs={}) {
  const e = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
  return e;
}
function add(p, ...kids) { kids.forEach(k => p.appendChild(k)); return p; }
function rct(x,y,w,h,a={}) { return mk('rect',{x,y,width:w,height:h,...a}); }
function lin(x1,y1,x2,y2,a={}) { return mk('line',{x1,y1,x2,y2,...a}); }
function lbl(x,y,s,c) { const t=mk('text',{x,y,class:c}); t.textContent=s; return t; }

// ── Dimensions ────────────────────────────────────────────────────────────────
// SVG viewBox. The room fills most of it with padding on all sides.
// Chosen so tables have generous ~86px centre-to-centre spacing.
// R = table radius = 28px.  S = spacing = 86px.

const VW = 860, VH = 760;  // viewBox
const R  = 28;              // table radius
const S  = 86;              // spacing between table centres

function buildMap() {
  const svg = document.getElementById('map');
  svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
  svg.setAttribute('width',   VW);
  svg.setAttribute('height',  VH);

  // ── Room boundary ─────────────────────────────────────────────────────────
  add(svg, rct(16,16,VW-32,VH-32,{fill:'none',stroke:'#bfb5aa','stroke-width':'1.5',rx:'3'}));

  // ══ ROOM FEATURES ═════════════════════════════════════════════════════════
  //
  // From the floor plan (left→right, top→bottom):
  //
  // TOP EDGE:
  //   DJ Table: far top-left corner nook
  //   Left Bar: top-centre-left
  //   Right Bar: top-right
  //
  // LEFT WALL (top→bottom):
  //   Dance floor: large square, upper-left (starts just below DJ table)
  //   Backdrop + arch: left wall, mid-height (alongside dance floor)
  //   Gift table: lower-left
  //   Photo bal & stairs: bottom-left block
  //
  // BOTTOM EDGE:
  //   Bridal entrance (centre-left)
  //   Guest entrance (centre-right)
  //   QR / welcome sign (far right)
  //
  // RIGHT EDGE:
  //   Photo booth: far bottom-right
  //
  // ══ COORDINATE PLAN ═══════════════════════════════════════════════════════
  //
  // DJ Table:        x=16,  y=16,  w=56,  h=52
  // Dance floor:     x=16,  y=68,  w=252, h=252  (bottom edge = y=320)
  // Left Bar:        x=280, y=16,  w=130, h=50
  // Right Bar:       x=600, y=16,  w=130, h=50
  // Backdrop+arch:   x=16,  y=336, w=14,  h=100  (thin strip left wall)
  // Gift table:      x=16,  y=450, w=106, h=26
  // Photo bal/stairs:x=16,  y=490, w=140, h=186  (bottom = y=676)
  // Bridal entrance: x=174, y=692, w=160, h=24
  // Guest entrance:  x=368, y=692, w=160, h=24
  // QR/sign:         x=664, y=692, w=120, h=24
  // Photo booth:     x=828, y=560, w=32,  h=120
  // Dashed divider:  x=400, y=66→686
  //
  // ══ TABLE GRID ════════════════════════════════════════════════════════════
  //
  // From the floor plan, reading carefully:
  //
  // TOP ROW (y=104): sits in the space above the dance floor / just below bars
  //   17 (x=200)  13 (x=286)  |  7 (x=458)  19 (x=544)
  //         ↑ left of dashed line      ↑ right of dashed line
  //
  // The dance floor occupies x=16→268, y=68→320.
  // Tables to the right of the dance floor start at x=320.
  // There are 2 columns between x=320 and the dashed line (x=400):
  //   Actually one column left of the dashed line (x≈340): 3, 5, 1♥, 6, 2
  //   One column just right of dashed line (x≈420): 9, 15, 11, 21, 8
  //   Third column (x≈506): 22, 12, 4, 20, 10
  //   Fourth column (x≈592): 18, 24, 23, 16, 27
  //
  // Row y values (below top row, beside / below dance floor):
  //   Row A: y=158  Row B: y=244  Row C: y=330  Row D: y=416  Row E: y=502
  //
  // Bottom-left cluster (below dance floor, near stairs):
  //   25 (x=200, y=416)   ← beside col A row D level
  //   28 (x=114, y=502)   ← near stairs
  //   14 (x=200, y=502)
  //
  // ═════════════════════════════════════════════════════════════════════════

  // DJ Table
  add(svg,
    rct(16,16,56,52,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1'}),
    lbl(44,42,'DJ TABLE','rlbl-sm')
  );

  // Left Bar
  add(svg,
    rct(280,16,130,50,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'2'}),
    lbl(345,41,'BAR','rlbl')
  );

  // Right Bar
  add(svg,
    rct(600,16,130,50,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'2'}),
    lbl(665,41,'BAR','rlbl')
  );

  // Dance floor
  add(svg,
    rct(16,68,252,252,{fill:'#ede5d8',stroke:'#c8b99a','stroke-width':'1.2',rx:'2'}),
    lbl(142,186,'Dance Floor','rlbl-lg'),
    lbl(142,208,"21' × 21'",'rlbl-sm')
  );

  // Backdrop + arch (thin strip, left wall)
  add(svg,
    rct(16,336,14,100,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1'}),
    lbl(23,386,'BACKDROP','rlbl-sm'),
    lbl(23,399,'+ ARCH','rlbl-sm')
  );

  // Gift table
  add(svg,
    rct(16,450,106,26,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'1'}),
    lbl(69,463,'GIFT TABLE','rlbl-sm')
  );

  // Photo bal & stairs
  add(svg,
    rct(16,490,140,186,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'2'}),
    lbl(86,576,'PHOTO BAL','rlbl'),
    lbl(86,591,'& STAIRS','rlbl')
  );

  // Bridal entrance
  add(svg,
    rct(174,692,160,24,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'1'}),
    lbl(254,704,'BRIDAL ENTRANCE','rlbl-sm')
  );

  // Guest entrance
  add(svg,
    rct(368,692,160,24,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'1'}),
    lbl(448,704,'GUEST ENTRANCE','rlbl-sm')
  );

  // QR / welcome sign
  add(svg,
    rct(664,692,120,24,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'1'}),
    lbl(724,704,'QR / SIGN','rlbl-sm')
  );

  // Photo booth (right wall, bottom)
  add(svg,
    rct(828,554,32,122,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'2'}),
    lbl(844,608,'PHOTO','rlbl-sm'),
    lbl(844,621,'BOOTH','rlbl-sm')
  );

  // Dashed centre divider
  add(svg,
    lin(400,66,400,686,{stroke:'#ccc3ba','stroke-width':'1','stroke-dasharray':'6,5'})
  );

  // ── Table positions ───────────────────────────────────────────────────────
  // Col x values:  A=334  B=420  C=506  D=592
  // Row y values:  1=158  2=244  3=330  4=416  5=502

  const tables = [
    // ── Top row (y=104) ──────────────────────────────────────────────────
    { n:17, x:200, y:104 },
    { n:13, x:286, y:104 },
    { n:7,  x:458, y:104 },
    { n:19, x:544, y:104 },

    // ── Col A (x=334) ────────────────────────────────────────────────────
    { n:3,  x:334, y:158 },
    { n:5,  x:334, y:244 },
    { n:1,  x:334, y:330, sweetheart:true },
    { n:6,  x:334, y:416 },
    { n:2,  x:334, y:502 },

    // ── Col B (x=420) ────────────────────────────────────────────────────
    { n:9,  x:420, y:158 },
    { n:15, x:420, y:244 },
    { n:11, x:420, y:330 },
    { n:21, x:420, y:416 },
    { n:8,  x:420, y:502 },

    // ── Col C (x=506) ────────────────────────────────────────────────────
    { n:22, x:506, y:158 },
    { n:12, x:506, y:244 },
    { n:4,  x:506, y:330 },
    { n:20, x:506, y:416 },
    { n:10, x:506, y:502 },

    // ── Col D (x=592) ────────────────────────────────────────────────────
    { n:18, x:592, y:158 },
    { n:24, x:592, y:244 },
    { n:23, x:592, y:330 },
    { n:16, x:592, y:416 },
    { n:27, x:592, y:502 },

    // ── Bottom-left cluster (below dance floor / near stairs) ─────────────
    { n:25, x:200, y:416 },
    { n:28, x:114, y:502 },
    { n:14, x:200, y:502 },
  ];

  tables.forEach(t => drawTable(svg, t.n, t.x, t.y, !!t.sweetheart));
}

// ── Draw table ────────────────────────────────────────────────────────────────
function drawTable(svg, num, x, y, isSweetheart) {
  const g = mk('g', { class:'tbl'+(isSweetheart?' sweetheart':''), 'data-table':num });
  add(g, mk('circle', { class:'bg', cx:x, cy:y, r:R }));

  if (isSweetheart) {
    const n = mk('text',{class:'num',x,y:y-8}); n.textContent=num; add(g,n);
    const s = mk('text',{class:'sub',x,y:y+10}); s.textContent='♥ sweetheart'; add(g,s);
  } else {
    const n = mk('text',{class:'num',x,y}); n.textContent=num; add(g,n);
  }

  add(svg, g);
  g.addEventListener('click', () => selectTable(num, g, isSweetheart));
}

// ── Panel ─────────────────────────────────────────────────────────────────────
let activeEl = null;

function selectTable(num, el, isSweetheart) {
  if (activeEl === el) {
    el.classList.remove('active'); activeEl = null;
    document.getElementById('panel-empty').style.display = 'block';
    document.getElementById('panel-card').style.display  = 'none';
    return;
  }
  if (activeEl) activeEl.classList.remove('active');
  el.classList.add('active'); activeEl = el;

  const names = tableMap[String(num)] || [];
  document.getElementById('panel-empty').style.display = 'none';
  const card = document.getElementById('panel-card');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';
  card.style.display = 'block';

  document.getElementById('pc-num').textContent  = num;
  document.getElementById('pc-lbl').textContent  = isSweetheart ? 'Sweetheart Table' : 'Table';
  document.getElementById('pc-guests').innerHTML = names.length
    ? names.map(n=>`<div class="pc-guest">${n}</div>`).join('')
    : `<div class="pc-guest" style="color:var(--ink-faint);font-style:italic">No guests assigned</div>`;
  document.getElementById('pc-count').textContent = names.length
    ? names.length+(names.length===1?' guest':' guests') : '';
}
</script>
</body>
</html>
