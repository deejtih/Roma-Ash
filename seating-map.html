<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seating Map · Roma &amp; Ashith</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --ink:#1e1a17; --ink-mid:#4a3f38; --ink-soft:#7a6b62; --ink-faint:#a89890;
    --parchment:#f7f3ee; --paper:#fdfbf8;
    --gold:#b8975a; --gold-pale:#e0cc9e; --gold-light:#f5ede3;
    --rule:#ddd5cc; --hover-bg:#f0e6d8; --active-bg:#e8d5bc;
  }
  body {
    font-family:'Tenor Sans',sans-serif; background:var(--parchment);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:3rem 1.5rem 5rem; color:var(--ink); position:relative; overflow-x:hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(184,151,90,.05) 39px,rgba(184,151,90,.05) 40px);
    pointer-events:none; z-index:0;
  }
  .corner { position:fixed; width:56px; height:56px; pointer-events:none; z-index:0; }
  .corner-tl { top:1.5rem; left:1.5rem; border-top:1px solid var(--gold-pale); border-left:1px solid var(--gold-pale); }
  .corner-tr { top:1.5rem; right:1.5rem; border-top:1px solid var(--gold-pale); border-right:1px solid var(--gold-pale); }
  .corner-bl { bottom:1.5rem; left:1.5rem; border-bottom:1px solid var(--gold-pale); border-left:1px solid var(--gold-pale); }
  .corner-br { bottom:1.5rem; right:1.5rem; border-bottom:1px solid var(--gold-pale); border-right:1px solid var(--gold-pale); }

  #loading-msg { font-size:.68rem; letter-spacing:.24em; text-transform:uppercase; color:var(--ink-faint); position:relative; z-index:1; animation:pulse 1.8s ease-in-out infinite; margin-top:6rem; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  #app { display:none; width:100%; flex-direction:column; align-items:center; position:relative; z-index:1; animation:rise .7s cubic-bezier(.22,.68,0,1.2) both; }
  @keyframes rise { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

  .nav-back { align-self:flex-start; font-size:.65rem; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-mid); text-decoration:none; border-bottom:1px solid var(--rule); padding-bottom:.2rem; margin-bottom:2.5rem; transition:color .2s,border-color .2s; }
  .nav-back:hover { color:var(--gold); border-color:var(--gold-pale); }

  .header { text-align:center; margin-bottom:2rem; }
  .pre-title { font-size:.65rem; letter-spacing:.32em; text-transform:uppercase; color:var(--gold); margin-bottom:.8rem; display:block; }
  h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(2.8rem,8vw,4.2rem); font-weight:300; font-style:italic; color:var(--ink); line-height:.92; margin-bottom:.7rem; }
  .subtitle { font-size:.65rem; letter-spacing:.26em; text-transform:uppercase; color:var(--ink-soft); }

  .ornament { display:flex; align-items:center; gap:.8rem; margin:0 auto 2.5rem; max-width:240px; width:100%; }
  .ornament-line { flex:1; height:1px; background:linear-gradient(to right,transparent,var(--gold-pale),transparent); }
  .ornament-gem { color:var(--gold); font-size:9px; }

  .layout { display:flex; gap:2.5rem; align-items:flex-start; width:100%; max-width:1260px; flex-wrap:wrap; justify-content:center; }

  /* ── Map card ── */
  .map-container {
    background:var(--paper); border:1px solid var(--rule); border-radius:2px;
    padding:1.75rem;
    box-shadow:0 2px 4px rgba(30,26,23,.05),0 12px 48px rgba(30,26,23,.09),inset 0 1px 0 rgba(255,255,255,.9);
    position:relative; flex-shrink:0; overflow:auto;
  }
  .map-container::before { content:''; position:absolute; top:10px; left:10px; width:14px; height:14px; border-top:1px solid var(--gold-pale); border-left:1px solid var(--gold-pale); }
  .map-container::after  { content:''; position:absolute; bottom:10px; right:10px; width:14px; height:14px; border-bottom:1px solid var(--gold-pale); border-right:1px solid var(--gold-pale); }

  /* ── Table circles ── */
  .tbl { cursor:pointer; }
  .tbl circle.bg {
    fill:var(--paper); stroke:#a89880; stroke-width:1.8;
    transition:fill .18s,stroke .2s,stroke-width .18s;
    filter:drop-shadow(0 1px 4px rgba(30,26,23,.12));
  }
  .tbl text.num {
    font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:400; font-style:italic;
    fill:#2a2218; text-anchor:middle; dominant-baseline:central;
    pointer-events:none; transition:fill .18s; user-select:none;
  }
  .tbl text.sub {
    font-family:'Tenor Sans',sans-serif; font-size:7.5px; letter-spacing:.1em;
    text-transform:uppercase; fill:var(--gold); text-anchor:middle;
    pointer-events:none; user-select:none;
  }
  .tbl:hover circle.bg { fill:var(--hover-bg); stroke:var(--gold); stroke-width:2.2; }
  .tbl:hover text.num  { fill:#8b6f3a; }
  .tbl.active circle.bg { fill:var(--active-bg); stroke:var(--gold); stroke-width:2.8; filter:drop-shadow(0 2px 8px rgba(184,151,90,.4)); }
  .tbl.active text.num  { fill:#6b4c1e; }

  /* Sweetheart */
  .tbl.sweetheart circle.bg { fill:#fdf0e0; stroke:var(--gold); stroke-width:2; }
  .tbl.sweetheart text.num  { fill:#8b6f3a; }
  .tbl.sweetheart:hover circle.bg, .tbl.sweetheart.active circle.bg { fill:var(--active-bg); stroke-width:2.8; }

  /* ── Room labels ── */
  .rlbl {
    font-family:'Tenor Sans',sans-serif; font-size:10px; letter-spacing:.13em;
    text-transform:uppercase; fill:#6b5d54;
    text-anchor:middle; dominant-baseline:central; pointer-events:none; user-select:none;
  }
  .rlbl-lg {
    font-family:'Cormorant Garamond',serif; font-size:17px; font-style:italic;
    fill:#6b5d54; text-anchor:middle; dominant-baseline:central;
    pointer-events:none; user-select:none;
  }
  .rlbl-sm {
    font-family:'Tenor Sans',sans-serif; font-size:8.5px; letter-spacing:.11em;
    text-transform:uppercase; fill:#8a7a72;
    text-anchor:middle; dominant-baseline:central; pointer-events:none; user-select:none;
  }

  /* ── Panel ── */
  .panel { flex:1; min-width:240px; max-width:300px; }
  .panel-placeholder { border:1px dashed var(--rule); border-radius:2px; padding:2.5rem 1.75rem; text-align:center; }
  .panel-placeholder p { font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--ink-faint); font-size:1.05rem; line-height:1.8; }
  .panel-card {
    background:var(--paper); border:1px solid var(--rule); border-radius:2px;
    padding:2rem 1.75rem; display:none; animation:rise .3s ease both;
    position:relative; box-shadow:0 4px 28px rgba(30,26,23,.08);
  }
  .panel-card::before { content:''; position:absolute; top:10px; left:10px; width:10px; height:10px; border-top:1px solid var(--gold-pale); border-left:1px solid var(--gold-pale); }
  .panel-card::after  { content:''; position:absolute; bottom:10px; right:10px; width:10px; height:10px; border-bottom:1px solid var(--gold-pale); border-right:1px solid var(--gold-pale); }
  .pc-num { font-family:'Cormorant Garamond',serif; font-size:4rem; font-weight:300; color:var(--gold); line-height:1; margin-bottom:.1rem; }
  .pc-lbl { font-size:.64rem; letter-spacing:.26em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:1.35rem; }
  .pc-sep { height:1px; background:linear-gradient(to right,transparent,var(--rule),transparent); margin-bottom:1.15rem; }
  .pc-guests-lbl { font-size:.62rem; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:.65rem; }
  .pc-guest { font-family:'Cormorant Garamond',serif; font-size:1.05rem; color:var(--ink-mid); line-height:1.85; }
  .pc-count { font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); margin-top:.9rem; }

  @media (max-width:700px) { .panel { max-width:100%; width:100%; } .layout { gap:1.5rem; } }
</style>
</head>
<body>
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div><div class="corner corner-br"></div>

  <p id="loading-msg">Loading guest list…</p>

  <div id="app">
    <a href="index.html" class="nav-back">← Back to find my seat</a>
    <div class="header">
      <span class="pre-title">Reception layout</span>
      <h1>Seating Map</h1>
      <p class="subtitle">Roma &amp; Ashith &middot; April 25, 2026</p>
    </div>
    <div class="ornament">
      <div class="ornament-line"></div><span class="ornament-gem">✦</span><div class="ornament-line"></div>
    </div>

    <div class="layout">
      <div class="map-container">
        <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="panel">
        <div class="panel-placeholder" id="panel-empty">
          <p>Select any table to see who's seated there</p>
        </div>
        <div class="panel-card" id="panel-card">
          <div class="pc-num" id="pc-num"></div>
          <div class="pc-lbl" id="pc-lbl">Table</div>
          <div class="pc-sep"></div>
          <div class="pc-guests-lbl">Guests</div>
          <div id="pc-guests"></div>
          <div class="pc-count" id="pc-count"></div>
        </div>
      </div>
    </div>
  </div>

<script>
let guests = [], tableMap = {};

async function loadGuests() {
  try {
    const res = await fetch('guests.xlsx?v=' + Date.now());
    if (!res.ok) throw new Error();
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, { type:'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
    guests = rows.map(r => ({
      name:  String(r['Full Name']    || '').trim(),
      table: String(r['Table Number'] || '').trim(),
    })).filter(g => g.name && g.table);
    tableMap = {};
    guests.forEach(g => {
      if (!tableMap[g.table]) tableMap[g.table] = [];
      tableMap[g.table].push(g.name);
    });
    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    buildMap();
  } catch(e) {
    document.getElementById('loading-msg').textContent = 'Guest list could not be loaded.';
  }
}
loadGuests();

// ── SVG helpers ───────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function mk(tag, attrs={}) {
  const e = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k, v));
  return e;
}
function add(parent, ...children) { children.forEach(c => parent.appendChild(c)); return parent; }
function rct(x,y,w,h,a={})     { return mk('rect', {x,y,width:w,height:h,...a}); }
function lin(x1,y1,x2,y2,a={}) { return mk('line', {x1,y1,x2,y2,...a}); }
function lbl(x,y,str,cls)       { const t=mk('text',{x,y,class:cls}); t.textContent=str; return t; }

// ── Canvas dimensions ─────────────────────────────────────────────────────────
// W × H chosen so all room features + tables fit with breathing room
// Table radius R=27, spacing S=76 (centre-to-centre)
const W = 940, H = 720;
const R = 27, S = 76;

function buildMap() {
  const svg = document.getElementById('map');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width',  W);
  svg.setAttribute('height', H);

  // ── Room wall ─────────────────────────────────────────────────────────────
  add(svg, rct(16, 16, W-32, H-32, {
    fill:'none', stroke:'#bfb5aa', 'stroke-width':'1.5', rx:'3'
  }));

  // ─────────────────────────────────────────────────────────────────────────
  // ROOM FEATURES
  // Layout (all coordinates inside the 16..W-16 / 16..H-16 room boundary):
  //
  //  TOP STRIP (y=16..74):
  //    DJ Table: x=16, w=60, h=58  → right edge x=76
  //    Left Bar: x=290, w=140, h=52
  //    Right Bar: x=620, w=140, h=52
  //
  //  LEFT SIDE:
  //    Dance floor: x=16, y=74, w=258, h=258  → bottom y=332
  //    Backdrop+arch: thin strip x=16, y=348..458
  //    Gift table: x=16, y=472, w=100, h=26
  //    Photo bal & stairs: x=16, y=506, w=148, h=182  → bottom y=688
  //
  //  BOTTOM STRIP (y=660..688):
  //    Bridal entrance: x=182, w=170, h=26
  //    Guest entrance:  x=380, w=170, h=26
  //    QR/sign:         x=720, w=120, h=26
  //
  //  BOTTOM-RIGHT:
  //    Photo booth: x=880, y=560, w=44, h=128
  //
  //  TABLES:
  //    Top row (y=44):      17(190) 13(266) | 7(482) 19(558)
  //    Rows 2-6 (x=340..628, y=152..532):
  //      Col A x=340: 3,5,1♥,6,2
  //      Col B x=416: 9,15,11,21,8
  //      Col C x=492: 22,12,4,20,10
  //      Col D x=568: 18,24,23,16,27
  //    Bottom-left cluster:
  //      25(190,448)  28(190,532)  14(266,532)
  // ─────────────────────────────────────────────────────────────────────────

  // DJ Table
  add(svg,
    rct(16,16,60,58,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1'}),
    lbl(46,45,'DJ TABLE','rlbl-sm')
  );

  // Left Bar
  add(svg,
    rct(290,16,140,52,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'2'}),
    lbl(360,42,'BAR','rlbl')
  );

  // Right Bar
  add(svg,
    rct(620,16,140,52,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'2'}),
    lbl(690,42,'BAR','rlbl')
  );

  // Dance floor
  add(svg,
    rct(16,74,258,258,{fill:'#ede5d8',stroke:'#c8b99a','stroke-width':'1.2',rx:'2'}),
    lbl(145,196,'Dance Floor','rlbl-lg'),
    lbl(145,216,"21' × 21'",'rlbl-sm')
  );

  // Backdrop + arch (thin left-wall strip)
  add(svg,
    rct(16,348,14,110,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1'}),
    lbl(23,403,'BACKDROP','rlbl-sm'),
    lbl(23,415,'+ ARCH','rlbl-sm')
  );

  // Gift table
  add(svg,
    rct(16,472,110,26,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'1'}),
    lbl(71,485,'GIFT TABLE','rlbl-sm')
  );

  // Photo bal & stairs
  add(svg,
    rct(16,506,148,182,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'2'}),
    lbl(90,587,'PHOTO BAL','rlbl'),
    lbl(90,602,'& STAIRS','rlbl')
  );

  // Bridal entrance
  add(svg,
    rct(182,662,170,26,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'1'}),
    lbl(267,675,'BRIDAL ENTRANCE','rlbl-sm')
  );

  // Guest entrance
  add(svg,
    rct(380,662,170,26,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'1'}),
    lbl(465,675,'GUEST ENTRANCE','rlbl-sm')
  );

  // QR / welcome sign
  add(svg,
    rct(720,662,120,26,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'1'}),
    lbl(780,675,'QR / SIGN','rlbl-sm')
  );

  // Photo booth (right wall)
  add(svg,
    rct(880,556,44,132,{fill:'#e4dcd2',stroke:'#c4bab0','stroke-width':'1',rx:'2'}),
    lbl(902,612,'PHOTO','rlbl-sm'),
    lbl(902,625,'BOOTH','rlbl-sm')
  );

  // Dashed centre divider
  add(svg,
    lin(454,68,454,656,{stroke:'#ccc3ba','stroke-width':'1','stroke-dasharray':'6,5'})
  );

  // ── Table positions ───────────────────────────────────────────────────────
  // Top row sits above the dance floor level, straddling left & right halves
  // Col X values: A=340, B=416, C=492, D=568 (spacing = S=76)
  // Row Y values: 1=152, 2=228, 3=304, 4=380, 5=456 (spacing = S=76, starting below top row)

  const tables = [
    // Top row (y=44) — above dance floor
    { n:17, x:190, y:44 },
    { n:13, x:266, y:44 },
    { n:7,  x:482, y:44 },
    { n:19, x:558, y:44 },

    // Col A (x=340), rows 1–5
    { n:3,  x:340, y:152 },
    { n:5,  x:340, y:228 },
    { n:1,  x:340, y:304, sweetheart:true },
    { n:6,  x:340, y:380 },
    { n:2,  x:340, y:456 },

    // Col B (x=416), rows 1–5
    { n:9,  x:416, y:152 },
    { n:15, x:416, y:228 },
    { n:11, x:416, y:304 },
    { n:21, x:416, y:380 },
    { n:8,  x:416, y:456 },

    // Col C (x=492), rows 1–5
    { n:22, x:492, y:152 },
    { n:12, x:492, y:228 },
    { n:4,  x:492, y:304 },
    { n:20, x:492, y:380 },
    { n:10, x:492, y:456 },

    // Col D (x=568), rows 1–5
    { n:18, x:568, y:152 },
    { n:24, x:568, y:228 },
    { n:23, x:568, y:304 },
    { n:16, x:568, y:380 },
    { n:27, x:568, y:456 },

    // Bottom-left cluster (below dance floor, near stairs)
    { n:25, x:190, y:456 },
    { n:28, x:190, y:532 },
    { n:14, x:266, y:532 },
  ];

  tables.forEach(t => drawTable(svg, t.n, t.x, t.y, t.sweetheart||false));
}

function drawTable(svg, num, x, y, isSweetheart) {
  const g = mk('g', { class:'tbl'+(isSweetheart?' sweetheart':''), 'data-table':num });
  add(g, mk('circle', { class:'bg', cx:x, cy:y, r:R }));

  if (isSweetheart) {
    const n = mk('text', { class:'num', x, y: y-8 }); n.textContent = num; add(g, n);
    const s = mk('text', { class:'sub', x, y: y+10 }); s.textContent = '♥ sweetheart'; add(g, s);
  } else {
    const n = mk('text', { class:'num', x, y }); n.textContent = num; add(g, n);
  }

  add(svg, g);
  g.addEventListener('click', () => selectTable(num, g, isSweetheart));
}

let activeEl = null;
function selectTable(num, el, isSweetheart) {
  if (activeEl === el) {
    el.classList.remove('active'); activeEl = null;
    document.getElementById('panel-empty').style.display = 'block';
    document.getElementById('panel-card').style.display  = 'none';
    return;
  }
  if (activeEl) activeEl.classList.remove('active');
  el.classList.add('active'); activeEl = el;

  const names = tableMap[String(num)] || [];
  document.getElementById('panel-empty').style.display = 'none';
  const card = document.getElementById('panel-card');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';
  card.style.display = 'block';

  document.getElementById('pc-num').textContent  = num;
  document.getElementById('pc-lbl').textContent  = isSweetheart ? 'Sweetheart Table' : 'Table';
  document.getElementById('pc-guests').innerHTML = names.length
    ? names.map(n => `<div class="pc-guest">${n}</div>`).join('')
    : `<div class="pc-guest" style="color:var(--ink-faint);font-style:italic">No guests assigned</div>`;
  document.getElementById('pc-count').textContent = names.length
    ? names.length + (names.length === 1 ? ' guest' : ' guests') : '';
}
</script>
</body>
</html>
