<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Seat · Roma &amp; Ashith</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:        #1e1a17;
    --ink-mid:    #6b5d54;
    --ink-soft:   #a89890;
    --ink-faint:  #cfc5be;
    --parchment:  #f7f3ee;
    --paper:      #fdfbf8;
    --gold:       #b8975a;
    --gold-pale:  #e8d9bc;
    --rule:       #ece5dc;
    --rule-soft:  #f3ede6;
    --hover-bg:   #f5ede3;
  }

  body {
    font-family: 'Tenor Sans', sans-serif;
    background: var(--parchment);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    color: var(--ink);
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 39px,
      rgba(184,151,90,0.06) 39px, rgba(184,151,90,0.06) 40px
    );
    pointer-events: none; z-index: 0;
  }

  .corner { position: fixed; width: 56px; height: 56px; pointer-events: none; z-index: 0; }
  .corner-tl { top: 1.5rem; left: 1.5rem; border-top: 1px solid var(--gold-pale); border-left: 1px solid var(--gold-pale); }
  .corner-tr { top: 1.5rem; right: 1.5rem; border-top: 1px solid var(--gold-pale); border-right: 1px solid var(--gold-pale); }
  .corner-bl { bottom: 1.5rem; left: 1.5rem; border-bottom: 1px solid var(--gold-pale); border-left: 1px solid var(--gold-pale); }
  .corner-br { bottom: 1.5rem; right: 1.5rem; border-bottom: 1px solid var(--gold-pale); border-right: 1px solid var(--gold-pale); }

  #loading {
    font-size: 0.65rem; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--ink-faint); position: relative; z-index: 1;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  #main {
    display: none; width: 100%; flex-direction: column; align-items: center;
    position: relative; z-index: 1;
    animation: rise 0.7s cubic-bezier(.22,.68,0,1.2) both;
  }
  @keyframes rise { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

  /* Header */
  .header { text-align: center; margin-bottom: 2rem; }
  .pre-title {
    font-size: 0.6rem; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 0.8rem; display: block;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 9vw, 4.5rem);
    font-weight: 300; font-style: italic;
    color: var(--ink); line-height: 0.9; margin-bottom: 0.7rem;
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 0.6rem; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--ink-soft);
  }

  /* Ornament */
  .ornament {
    display: flex; align-items: center; gap: 0.8rem;
    margin: 0 auto 2.5rem; max-width: 240px; width: 100%;
  }
  .ornament-line {
    flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-pale), transparent);
  }
  .ornament-gem { color: var(--gold); font-size: 9px; }

  /* Card */
  .card {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 1px;
    padding: 2.5rem 2.5rem 2rem;
    width: 100%; max-width: 460px;
    box-shadow: 0 1px 2px rgba(30,26,23,.03), 0 8px 40px rgba(30,26,23,.07),
                inset 0 1px 0 rgba(255,255,255,.9);
    position: relative;
  }
  .card::before { content:''; position:absolute; top:8px; left:8px; width:10px; height:10px; border-top:1px solid var(--gold-pale); border-left:1px solid var(--gold-pale); }
  .card::after  { content:''; position:absolute; bottom:8px; right:8px; width:10px; height:10px; border-bottom:1px solid var(--gold-pale); border-right:1px solid var(--gold-pale); }

  .field-label {
    font-size: 0.58rem; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--ink-soft); display: block; margin-bottom: 0.5rem;
  }

  .input-wrap { position: relative; margin-bottom: 1.25rem; }

  input[type="text"] {
    width: 100%; padding: 0.72rem 1rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem; font-weight: 300;
    color: var(--ink); background: var(--parchment);
    border: 1px solid var(--rule); border-radius: 1px;
    outline: none; transition: border-color .2s, box-shadow .2s;
  }
  input[type="text"]:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184,151,90,.1); }
  input[type="text"]::placeholder { color: var(--ink-faint); }

  /* Dropdown */
  #suggestions {
    position: absolute; top: calc(100% + 5px); left: 0; right: 0;
    background: var(--paper); border: 1px solid var(--rule); border-radius: 1px;
    overflow: hidden; z-index: 20; display: none;
    box-shadow: 0 8px 28px rgba(30,26,23,.1);
  }
  .sug-item {
    padding: 0.65rem 1rem;
    font-family: 'Cormorant Garamond', serif; font-size: 1.05rem;
    color: var(--ink); cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--rule-soft); transition: background .12s;
  }
  .sug-item:last-child { border-bottom: none; }
  .sug-item:hover { background: var(--hover-bg); }
  .sug-badge {
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.56rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--gold); background: rgba(184,151,90,.1);
    padding: .15rem .45rem; border-radius: 20px;
  }

  /* Button */
  .lookup-btn {
    width: 100%; padding: 0.82rem;
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.63rem; letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--ink); background: transparent;
    border: 1px solid var(--gold); border-radius: 1px;
    cursor: pointer; transition: color .25s, background .25s, box-shadow .25s;
    position: relative; overflow: hidden;
  }
  .lookup-btn::before {
    content:''; position:absolute; inset:0; background:var(--gold);
    transform:scaleX(0); transform-origin:left; transition:transform .3s ease; z-index:-1;
  }
  .lookup-btn:hover { color: var(--paper); box-shadow: 0 4px 18px rgba(184,151,90,.28); }
  .lookup-btn:hover::before { transform:scaleX(1); }

  .sep {
    height: 1px;
    background: linear-gradient(to right, transparent, var(--rule), transparent);
    margin: 1.75rem 0;
  }

  #result { display: none; }

  .result-found { text-align: center; padding: .5rem 0 .25rem; animation: rise .5s ease both; }

  .welcome-label {
    font-size: 0.56rem; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: .4rem;
  }
  .guest-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem; font-style: italic; font-weight: 300;
    color: var(--ink); margin-bottom: 1.5rem; line-height: 1.1;
  }
  .table-box {
    display: inline-block; border: 1px solid var(--rule);
    padding: 1.1rem 2.75rem 1rem; position: relative;
    background: var(--parchment);
  }
  .table-box::before { content:''; position:absolute; top:5px; left:5px; width:8px; height:8px; border-top:1px solid var(--gold-pale); border-left:1px solid var(--gold-pale); }
  .table-box::after  { content:''; position:absolute; bottom:5px; right:5px; width:8px; height:8px; border-bottom:1px solid var(--gold-pale); border-right:1px solid var(--gold-pale); }
  .table-lbl {
    font-size: 0.56rem; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: .2rem;
  }
  .table-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem; font-weight: 300; color: var(--ink); line-height: 1;
  }

  /* Did you mean */
  .did-you-mean {
    font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-soft); text-align: center; margin-bottom: .85rem;
  }
  .sug-btn {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; text-align: left; padding: .65rem 1rem;
    font-family: 'Cormorant Garamond', serif; font-size: 1.1rem;
    color: var(--ink); background: transparent;
    border: 1px solid var(--rule); border-radius: 1px;
    cursor: pointer; margin-bottom: .45rem;
    transition: background .15s, border-color .15s;
  }
  .sug-btn:hover { background: var(--hover-bg); border-color: var(--gold-pale); }
  .sug-btn-meta {
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.58rem; letter-spacing: .1em;
    color: var(--ink-faint); white-space: nowrap; margin-left: .75rem;
  }

  .not-found { text-align: center; padding: .75rem 0; }
  .not-found p {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    color: var(--ink-soft); font-size: 1.05rem; line-height: 1.7;
  }

  /* Tablemates */
  .tablemates { margin-top: 1.5rem; text-align: center; }
  .tablemates-label {
    font-size: 0.56rem; letter-spacing: .2em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: .6rem;
  }
  .tablemate {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem; color: var(--ink-soft); line-height: 1.8;
  }

  /* Map link */
  .map-link {
    display: inline-flex; align-items: center; gap: .4rem;
    margin-top: 2.5rem;
    font-size: 0.58rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--ink-soft); text-decoration: none;
    border-bottom: 1px solid var(--rule); padding-bottom: .2rem;
    transition: color .2s, border-color .2s;
  }
  .map-link:hover { color: var(--gold); border-color: var(--gold-pale); }

  @media (max-width: 480px) {
    .card { padding: 2rem 1.5rem 1.75rem; }
    h1 { font-size: 3.2rem; }
  }
</style>
</head>
<body>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <p id="loading">Loading guest list…</p>

  <div id="main">
    <div class="header">
      <span class="pre-title">You are invited</span>
      <h1>Find Your Seat</h1>
      <p class="subtitle">Roma &amp; Ashith &middot; April 25, 2026</p>
    </div>

    <div class="ornament">
      <div class="ornament-line"></div>
      <span class="ornament-gem">✦</span>
      <div class="ornament-line"></div>
    </div>

    <div class="card">
      <div class="input-wrap">
        <label class="field-label" for="nameInput">Your name</label>
        <input type="text" id="nameInput" placeholder="e.g. Sarah Johnson" autocomplete="off" />
        <div id="suggestions"></div>
      </div>
      <button class="lookup-btn" onclick="lookup()">Find my table</button>
      <div id="result"></div>
    </div>

    <a href="seating-map.html" class="map-link">View seating map →</a>
  </div>

<script>
let guests = [];

async function loadGuests() {
  try {
    const res = await fetch('guests.xlsx?v=' + Date.now());
    if (!res.ok) throw new Error();
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
    guests = rows.map(r => ({
      name:      String(r['Full Name']    || '').trim(),
      firstName: String(r['First Name']   || '').trim(),
      table:     String(r['Table Number'] || '').trim(),
    })).filter(g => g.name);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
  } catch(e) {
    document.getElementById('loading').textContent = 'Guest list could not be loaded. Please try again later.';
  }
}
loadGuests();

function levenshtein(a, b) {
  const m=a.length, n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>j===0?i:0));
  for(let j=1;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function fuzzyScore(query, candidate) {
  query=query.toLowerCase(); candidate=candidate.toLowerCase();
  if(candidate===query) return 1;
  if(candidate.includes(query)||query.includes(candidate)) return 0.93;
  const qw=query.split(' '), cw=candidate.split(' ');
  let ws=0;
  for(const q of qw){
    let best=0;
    for(const c of cw){
      if(c===q) best=Math.max(best,1);
      else if(c.startsWith(q)||q.startsWith(c)) best=Math.max(best,.85);
      else best=Math.max(best,1-levenshtein(q,c)/Math.max(q.length,c.length));
    }
    ws+=best;
  }
  ws/=Math.max(qw.length,cw.length);
  const fs=1-levenshtein(query,candidate)/Math.max(query.length,candidate.length);
  return Math.max(ws*.9,fs);
}

function getSuggestions(query, threshold=0.36, max=5) {
  if(!query||query.length<2) return [];
  return guests
    .map(g=>({guest:g, score:Math.max(fuzzyScore(query,g.name),fuzzyScore(query,g.firstName))}))
    .filter(x=>x.score>=threshold).sort((a,b)=>b.score-a.score).slice(0,max);
}

const nameInput = document.getElementById('nameInput');
const sugBox    = document.getElementById('suggestions');

nameInput.addEventListener('input', () => {
  const val = nameInput.value.trim();
  const matches = getSuggestions(val, 0.38, 5);
  if(!matches.length||val.length<2){ sugBox.style.display='none'; return; }
  sugBox.innerHTML = matches.map(({guest,score}) =>
    `<div class="sug-item"><span>${guest.name}</span>
     <span class="sug-badge">${score>=.95?'exact':score>=.8?'close':'similar'}</span></div>`
  ).join('');
  sugBox.querySelectorAll('.sug-item').forEach((el,i) => {
    el.addEventListener('mousedown', e=>{ e.preventDefault(); selectGuest(matches[i].guest.name); });
  });
  sugBox.style.display = 'block';
});

document.addEventListener('mousedown', e => {
  if(!e.target.closest('.input-wrap')) sugBox.style.display='none';
});

function selectGuest(name) {
  nameInput.value = name;
  sugBox.style.display = 'none';
  const g = guests.find(g=>g.name.toLowerCase()===name.toLowerCase());
  if(g) showResult(g);
}

function lookup() {
  sugBox.style.display = 'none';
  const val = nameInput.value.trim();
  const res = document.getElementById('result');
  if(!val){ res.style.display='none'; return; }
  res.style.display = 'block';

  const exact = guests.find(g=>g.name.toLowerCase()===val.toLowerCase());
  if(exact){ showResult(exact); return; }

  const matches = getSuggestions(val, 0.38, 5);
  if(matches.length===1 && matches[0].score>=0.82){ showResult(matches[0].guest); return; }

  if(matches.length > 0) {
    res.innerHTML =
      `<div class="sep"></div><div class="did-you-mean">Did you mean…</div>` +
      matches.map(({guest},i) =>
        `<button class="sug-btn" data-idx="${i}">
           <span>${guest.name}</span>
           <span class="sug-btn-meta">Table ${guest.table}</span>
         </button>`
      ).join('');
    // mousedown prevents blur/click race — this is the fix
    res.querySelectorAll('.sug-btn').forEach((btn,i) => {
      btn.addEventListener('mousedown', e=>{ e.preventDefault(); selectGuest(matches[i].guest.name); });
    });
    return;
  }

  res.innerHTML = `<div class="sep"></div><div class="not-found"><p>We couldn't find your name.<br>Please check the spelling or ask a member of the wedding party.</p></div>`;
}

function showResult(g) {
  const tablemates = guests.filter(x=>x.table===g.table&&x.name!==g.name);
  const tmHTML = tablemates.length
    ? `<div class="tablemates"><div class="tablemates-label">Also at your table</div>
       ${tablemates.map(x=>`<div class="tablemate">${x.name}</div>`).join('')}</div>` : '';
  document.getElementById('result').innerHTML =
    `<div class="sep"></div>
     <div class="result-found">
       <div class="welcome-label">Welcome,</div>
       <div class="guest-name">${g.name}</div>
       <div class="table-box">
         <div class="table-lbl">Your table</div>
         <div class="table-num">${g.table}</div>
       </div>${tmHTML}
     </div>`;
}

nameInput.addEventListener('keydown', e=>{ if(e.key==='Enter') lookup(); });
</script>
</body>
</html>
